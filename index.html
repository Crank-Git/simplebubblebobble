<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Bust" />
<meta name="theme-color" content="#0b0d12" />
<title>Bust A Move</title>
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='32' fill='%230b0d12'/><circle cx='56' cy='62' r='18' fill='%23ff5577'/><circle cx='94' cy='58' r='18' fill='%235cc9ff'/><circle cx='132' cy='62' r='18' fill='%235cd86b'/><circle cx='74' cy='96' r='18' fill='%23ffba3d'/><circle cx='112' cy='96' r='18' fill='%23c084fc'/><circle cx='90' cy='142' r='20' fill='%23ff8a3d' stroke='%23ffffff' stroke-width='3'/></svg>" />
<link rel="manifest" href="manifest.webmanifest" />
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
<style>
  :root {
    --bg: #0b0d12;
    --bg-2: #11141c;
    --panel: #161a24;
    --panel-2: #1d2230;
    --border: #2a3142;
    --text: #e6e9f2;
    --text-dim: #8a93a8;
    --accent: #5cc9ff;
    --accent-2: #5cd86b;
    --danger: #ff5577;

    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-left: env(safe-area-inset-left, 0px);
    --safe-right: env(safe-area-inset-right, 0px);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
    padding-left: var(--safe-left);
    padding-right: var(--safe-right);
    background:
      radial-gradient(1200px 800px at 50% -10%, rgba(92,201,255,0.07), transparent 60%),
      radial-gradient(800px 600px at 50% 110%, rgba(255,85,119,0.05), transparent 60%),
      var(--bg);
  }

  .topbar {
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    padding: 8px 12px 4px;
  }
  .info {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 44px;
    justify-content: center;
  }
  .info .label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .info .value {
    font-size: 18px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }

  .stage {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px 8px;
    min-height: 0;
    position: relative;
  }
  #board {
    background: linear-gradient(180deg, #0d1018, #0a0c12);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.02);
    display: block;
    touch-action: none;
  }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .overlay.show { pointer-events: auto; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 26px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.55);
    text-align: center;
    max-width: 320px;
    transform: scale(0.94);
    opacity: 0;
    transition: opacity 0.18s ease, transform 0.22s ease;
  }
  .overlay.show .panel { opacity: 1; transform: scale(1); }
  .panel h1 {
    margin: 0 0 6px;
    font-size: 22px;
    letter-spacing: 0.04em;
    color: var(--accent-2);
  }
  .panel p {
    margin: 4px 0 14px;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
  }
  .panel .stat-row {
    display: flex;
    justify-content: space-around;
    margin: 10px 0 14px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .panel .stat-row strong {
    color: var(--text);
    display: block;
    font-size: 18px;
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }
  .btn {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: transform 0.05s ease, background 0.15s ease;
  }
  .btn:active { transform: scale(0.97); }
  .btn.primary {
    background: linear-gradient(180deg, #2a6cff, #1e58e0);
    border-color: #2a6cff;
  }

  .controls {
    flex: 0 0 auto;
    padding: 6px 10px 10px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    align-items: end;
  }
  .pad {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    max-width: 220px;
    width: 100%;
    justify-self: start;
  }
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    max-width: 220px;
    width: 100%;
    justify-self: end;
    align-self: end;
  }
  .key {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 18px;
    font-weight: 700;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.05s ease, transform 0.05s ease;
    height: 100%;
    min-height: 56px;
    gap: 0;
  }
  .key:active, .key.pressed { background: var(--panel-2); transform: scale(0.97); }
  .key.fire {
    background: linear-gradient(180deg, #6a1a2a, #3f0d18);
    border-color: #a8253c;
    color: #ffd6df;
  }
  .key.swap {
    background: linear-gradient(180deg, #1e3a5f, #142944);
    border-color: #2a5a9f;
    color: #cde7ff;
  }
  .key svg { width: 22px; height: 22px; }
  .key .label-sm {
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 2px;
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="info"><div class="label">Score</div><div class="value" id="score">0</div></div>
    <div class="info"><div class="label">Level</div><div class="value" id="level">1</div></div>
    <div class="info"><div class="label">Best</div><div class="value" id="best">0</div></div>
  </div>

  <div class="stage">
    <canvas id="board" width="240" height="320"></canvas>
    <div class="overlay show" id="overlay">
      <div class="panel" id="panel">
        <h1 id="panelTitle">Bust A Move</h1>
        <p id="panelMsg">Drag to aim, lift to fire.<br>Match 3+ same-color bubbles to pop them.<br>For my favorite player 💚</p>
        <div class="stat-row" id="panelStats" style="display:none">
          <div>Score<strong id="panelScore">0</strong></div>
          <div>Level<strong id="panelLevel">1</strong></div>
          <div>Best<strong id="panelBest">0</strong></div>
        </div>
        <button class="btn primary" id="startBtn">Start</button>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="pad">
      <div class="key" data-key="left" aria-label="Aim left">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 12l10-8v5h6v6h-6v5z"/></svg>
        <div class="label-sm">Aim</div>
      </div>
      <div class="key" data-key="right" aria-label="Aim right">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 12l-10-8v5H4v6h6v5z"/></svg>
        <div class="label-sm">Aim</div>
      </div>
    </div>
    <div class="actions">
      <div class="key swap" data-key="swap" aria-label="Swap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h11l-3-3"/><path d="M17 17H6l3 3"/></svg>
        <div class="label-sm">Swap</div>
      </div>
      <div class="key fire" data-key="fire" aria-label="Fire">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="6"/></svg>
        <div class="label-sm">Fire</div>
      </div>
    </div>
  </div>

<script>
(() => {
  'use strict';

  // ===== Constants =====
  const COLS = 8;
  const ROWS = 14;
  const BR = 12;                       // bubble radius (source px)
  const CELL_W = BR * 2;               // 24
  const CELL_H = Math.round(BR * 2 * 0.866); // 21
  const WORLD_W = COLS * CELL_W;       // 192
  const SHOOTER_PANEL_H = 56;
  const PLAY_H = ROWS * CELL_H + BR + 6; // playfield height for grid
  const WORLD_H = PLAY_H + SHOOTER_PANEL_H;
  const SHOT_SPEED = 6.0;
  const SHOTS_PER_DROP = 8;
  const DEAD_LINE_Y = PLAY_H - 4;      // any bubble center past this = lose
  const MIN_ANGLE = -75 * Math.PI / 180;   // -75deg from vertical (i.e. up-left)
  const MAX_ANGLE =  75 * Math.PI / 180;

  const COLORS = [
    '#ff5577',  // red
    '#5cc9ff',  // blue
    '#5cd86b',  // green
    '#ffba3d',  // yellow
    '#c084fc',  // purple
    '#ff8a3d',  // orange
  ];
  const SHADOWS = [
    '#8a1f30', '#1f6f9c', '#2a8a3a', '#9a7a1a', '#6a3aac', '#a8501a',
  ];

  // Number of distinct colors used per level
  const COLORS_PER_LEVEL = [4, 4, 5, 5, 5, 6, 6, 6, 6, 6];

  // ===== Levels =====
  // Each row is COLS chars (or COLS-1 for offset rows we still write COLS chars, last col ignored on odd rows).
  // Digits 0-5 = colors, '.' = empty.
  const LEVELS = [
    // Level 1: easy intro
    [
      "01010101",
      "1010101.",
      "01010101",
      "2323232.",
      "32323232",
      "........",
      "........",
    ],
    // Level 2
    [
      "00112233",
      "0011223.",
      "33221100",
      "3322110.",
      "01230123",
      "1230123.",
      "........",
    ],
    // Level 3
    [
      "01234012",
      "1234012.",
      "23401234",
      "3401234.",
      "01234012",
      "........",
      "........",
    ],
    // Level 4: zigzag
    [
      "00001111",
      ".1111000",
      "22220000",
      ".0000222",
      "33333333",
      "........",
      "........",
    ],
    // Level 5
    [
      "01230123",
      "1234123.",
      "23401234",
      "3402340.",
      "40123401",
      "12341234",
      "........",
    ],
    // Level 6: heart-ish
    [
      ".00..11.",
      "0000111.",
      "00001111",
      "0001111.",
      ".001110.",
      "..0110..",
      "...22...",
    ],
    // Level 7
    [
      "01234501",
      "2345012.",
      "34501234",
      "5012345.",
      "01234501",
      "23450123",
      "45012345",
    ],
    // Level 8: stripes
    [
      "00112233",
      ".0112233",
      "44550011",
      ".4550011",
      "22334455",
      ".2334455",
      "00112233",
    ],
    // Level 9: walls
    [
      "55555555",
      "5000005.",
      "50111150",
      "5011115.",
      "50222250",
      "5022225.",
      "55555555",
    ],
    // Level 10: dense
    [
      "01234543",
      "2101252.",
      "30453245",
      "4543201.",
      "01234043",
      "12340321",
      "23415432",
    ],
  ];

  // ===== Canvas =====
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  canvas.width = WORLD_W;
  canvas.height = WORLD_H;

  function resize() {
    const stage = canvas.parentElement;
    const sw = stage.clientWidth - 16;
    const sh = stage.clientHeight - 16;
    const aspect = WORLD_W / WORLD_H;
    let w = sw;
    let h = w / aspect;
    if (h > sh) { h = sh; w = h * aspect; }
    canvas.style.width = Math.floor(w) + 'px';
    canvas.style.height = Math.floor(h) + 'px';
  }
  window.addEventListener('resize', resize);

  // ===== State =====
  const state = {
    mode: 'menu',
    modeTimer: 0,
    level: 0,
    score: 0,
    best: parseInt(localStorage.getItem('simpleBustAMove.best') || '0', 10),
    grid: null,             // ROWS x COLS, -1 or color index
    shooter: { x: WORLD_W / 2, y: PLAY_H + SHOOTER_PANEL_H / 2, angle: 0 },
    flying: null,           // { x, y, vx, vy, color }
    current: 0,
    next: 0,
    shotsTaken: 0,
    ceilingOffset: 0,       // pixels of vertical offset for the whole grid (drops)
    popping: [],            // { x, y, color, t, max }
    falling: [],            // { x, y, vx, vy, color, life }
    particles: [],
    shake: 0,
    aimDragging: false,
    showAim: false,
    frame: 0,
    numColors: 4,
  };

  // ===== Geometry =====
  function rowOffset(r) { return (r % 2 === 0) ? 0 : CELL_W / 2; }
  function cellCenter(c, r) {
    return {
      x: c * CELL_W + CELL_W / 2 + rowOffset(r),
      y: r * CELL_H + BR + 2 + state.ceilingOffset,
    };
  }
  function cellInBounds(c, r) {
    if (r < 0 || r >= ROWS || c < 0) return false;
    // Odd rows have one fewer effective column
    const maxC = (r % 2 === 0) ? COLS : COLS - 1;
    return c < maxC;
  }
  function neighbors(c, r) {
    const list = [[c - 1, r], [c + 1, r]];
    if (r % 2 === 0) {
      list.push([c - 1, r - 1], [c, r - 1], [c - 1, r + 1], [c, r + 1]);
    } else {
      list.push([c, r - 1], [c + 1, r - 1], [c, r + 1], [c + 1, r + 1]);
    }
    return list.filter(([cc, rr]) => cellInBounds(cc, rr));
  }

  // ===== Level loading =====
  function loadLevel(idx) {
    const raw = LEVELS[idx % LEVELS.length];
    const grid = [];
    for (let r = 0; r < ROWS; r++) grid.push(new Array(COLS).fill(-1));
    for (let r = 0; r < raw.length; r++) {
      for (let c = 0; c < COLS; c++) {
        if (!cellInBounds(c, r)) continue;
        const ch = raw[r][c];
        if (ch === undefined || ch === '.' || ch === ' ') continue;
        const n = parseInt(ch, 10);
        if (!isNaN(n)) grid[r][c] = n;
      }
    }
    state.grid = grid;
    state.ceilingOffset = 0;
    state.shotsTaken = 0;
    state.popping = [];
    state.falling = [];
    state.particles = [];
    state.flying = null;
    state.numColors = COLORS_PER_LEVEL[Math.min(idx, COLORS_PER_LEVEL.length - 1)];
    state.current = pickColor();
    state.next = pickColor();
    state.shooter.angle = 0;
    state.showAim = false;
  }

  function pickColor() {
    // Bias toward colors present on the board so progress is possible
    const present = new Set();
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (state.grid && state.grid[r][c] >= 0) present.add(state.grid[r][c]);
      }
    }
    if (present.size === 0) return Math.floor(Math.random() * state.numColors);
    const arr = [...present];
    return arr[Math.floor(Math.random() * arr.length)];
  }

  // ===== Audio =====
  let audioCtx = null;
  function audio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    return audioCtx;
  }
  function blip(freq, dur, type = 'square', gain = 0.06) {
    const ac = audio(); if (!ac) return;
    const t = ac.currentTime;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(gain, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t + dur);
  }
  function sweep(f1, f2, dur, type = 'sine', gain = 0.08) {
    const ac = audio(); if (!ac) return;
    const t = ac.currentTime;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.setValueAtTime(f1, t);
    o.frequency.exponentialRampToValueAtTime(f2, t + dur);
    g.gain.setValueAtTime(gain, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t + dur);
  }
  const sfx = {
    fire:  () => sweep(900, 300, 0.08, 'sine', 0.04),
    stick: () => blip(280, 0.04, 'square', 0.05),
    pop:   (n) => {
      for (let i = 0; i < Math.min(n, 6); i++) {
        setTimeout(() => sweep(500 + i * 80, 180 + i * 20, 0.1, 'triangle', 0.05), i * 35);
      }
    },
    fall:  () => sweep(420, 80, 0.3, 'sawtooth', 0.04),
    swap:  () => blip(660, 0.05, 'square', 0.04),
    drop:  () => sweep(140, 90, 0.25, 'sawtooth', 0.06),
    level: () => { blip(660, 0.1, 'square', 0.05); setTimeout(() => blip(880, 0.1, 'square', 0.05), 110); setTimeout(() => blip(1100, 0.16, 'square', 0.05), 220); },
    over:  () => sweep(300, 60, 0.6, 'sawtooth', 0.07),
    start: () => { blip(440, 0.08, 'square', 0.05); setTimeout(() => blip(660, 0.12, 'square', 0.05), 90); },
  };

  // ===== Input =====
  const keys = { left: false, right: false };
  const edge = { fire: false, swap: false };

  document.querySelectorAll('.key[data-key]').forEach((el) => {
    const k = el.dataset.key;
    const press = (e) => {
      e.preventDefault();
      el.classList.add('pressed');
      if (k === 'left' || k === 'right') keys[k] = true;
      else if (k === 'fire') edge.fire = true;
      else if (k === 'swap') edge.swap = true;
    };
    const rel = (e) => {
      e.preventDefault();
      el.classList.remove('pressed');
      if (k === 'left' || k === 'right') keys[k] = false;
    };
    el.addEventListener('touchstart', press, { passive: false });
    el.addEventListener('touchend', rel, { passive: false });
    el.addEventListener('touchcancel', rel, { passive: false });
    el.addEventListener('mousedown', press);
    el.addEventListener('mouseup', rel);
    el.addEventListener('mouseleave', rel);
  });

  window.addEventListener('keydown', (e) => {
    if (e.repeat) return;
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
    else if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
    else if (e.key === ' ' || e.key === 'Enter' || e.key === 'x') edge.fire = true;
    else if (e.key === 'Shift' || e.key === 'z' || e.key === 'ArrowUp') edge.swap = true;
    else return;
    e.preventDefault();
  });
  window.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
    else if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
  });

  // Canvas touch/drag aiming
  function canvasPoint(e) {
    const r = canvas.getBoundingClientRect();
    let cx, cy;
    if (e.touches && e.touches.length) {
      cx = e.touches[0].clientX; cy = e.touches[0].clientY;
    } else if (e.changedTouches && e.changedTouches.length) {
      cx = e.changedTouches[0].clientX; cy = e.changedTouches[0].clientY;
    } else { cx = e.clientX; cy = e.clientY; }
    return {
      x: (cx - r.left) * (WORLD_W / r.width),
      y: (cy - r.top) * (WORLD_H / r.height),
    };
  }
  function updateAimFromPoint(p) {
    const sx = state.shooter.x, sy = state.shooter.y;
    const dx = p.x - sx, dy = p.y - sy;
    if (dy >= -2) return;     // ignore points below shooter
    let ang = Math.atan2(dx, -dy);     // 0 = straight up
    ang = Math.max(MIN_ANGLE, Math.min(MAX_ANGLE, ang));
    state.shooter.angle = ang;
    state.showAim = true;
  }
  const onCanvasStart = (e) => {
    if (state.mode !== 'playing' || state.flying) return;
    e.preventDefault();
    state.aimDragging = true;
    updateAimFromPoint(canvasPoint(e));
  };
  const onCanvasMove = (e) => {
    if (!state.aimDragging) return;
    e.preventDefault();
    updateAimFromPoint(canvasPoint(e));
  };
  const onCanvasEnd = (e) => {
    if (!state.aimDragging) return;
    e.preventDefault();
    state.aimDragging = false;
    if (state.mode === 'playing' && !state.flying) {
      fireBubble();
    }
  };
  canvas.addEventListener('touchstart', onCanvasStart, { passive: false });
  canvas.addEventListener('touchmove',  onCanvasMove,  { passive: false });
  canvas.addEventListener('touchend',   onCanvasEnd,   { passive: false });
  canvas.addEventListener('touchcancel',onCanvasEnd,   { passive: false });
  canvas.addEventListener('mousedown',  onCanvasStart);
  canvas.addEventListener('mousemove',  onCanvasMove);
  canvas.addEventListener('mouseup',    onCanvasEnd);
  canvas.addEventListener('mouseleave', (e) => { if (state.aimDragging) state.aimDragging = false; });

  // ===== Game actions =====
  function fireBubble() {
    if (state.flying) return;
    if (state.mode !== 'playing') return;
    const ang = state.shooter.angle;
    state.flying = {
      x: state.shooter.x,
      y: state.shooter.y - BR - 2,
      vx: Math.sin(ang) * SHOT_SPEED,
      vy: -Math.cos(ang) * SHOT_SPEED,
      color: state.current,
    };
    state.current = state.next;
    state.next = pickColor();
    state.showAim = false;
    sfx.fire();
  }

  function swapBubble() {
    if (state.flying) return;
    if (state.mode !== 'playing') return;
    const t = state.current;
    state.current = state.next;
    state.next = t;
    sfx.swap();
  }

  // Update flying bubble — returns true if it stuck/snapped this frame
  function updateFlying() {
    const f = state.flying;
    if (!f) return;
    // Step in small increments to avoid tunneling
    const steps = 4;
    const dx = f.vx / steps, dy = f.vy / steps;
    for (let s = 0; s < steps; s++) {
      f.x += dx;
      f.y += dy;
      if (f.x - BR < 0) { f.x = BR; f.vx = Math.abs(f.vx); }
      if (f.x + BR > WORLD_W) { f.x = WORLD_W - BR; f.vx = -Math.abs(f.vx); }
      // Hit top
      if (f.y - BR < state.ceilingOffset + 2) {
        snapFlying();
        return;
      }
      // Hit any grid bubble
      let hit = null;
      let bestD = Infinity;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (!cellInBounds(c, r)) continue;
          if (state.grid[r][c] < 0) continue;
          const ctr = cellCenter(c, r);
          const ddx = ctr.x - f.x, ddy = ctr.y - f.y;
          const d2 = ddx * ddx + ddy * ddy;
          if (d2 < (BR * 2) * (BR * 2)) {
            if (d2 < bestD) { bestD = d2; hit = { c, r }; }
          }
        }
      }
      if (hit) { snapFlying(); return; }
    }
  }

  function snapFlying() {
    const f = state.flying;
    // Find nearest empty cell whose center is closest to f.x, f.y
    let best = null;
    let bestD = Infinity;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (!cellInBounds(c, r)) continue;
        if (state.grid[r][c] !== -1) continue;
        const ctr = cellCenter(c, r);
        // Must be reasonably near (within ~1.5 cells)
        if (Math.abs(ctr.y - f.y) > CELL_H * 1.6) continue;
        const dx = ctr.x - f.x, dy = ctr.y - f.y;
        const d2 = dx * dx + dy * dy;
        if (d2 < bestD) { bestD = d2; best = { c, r, ctr }; }
      }
    }
    if (!best) {
      // Couldn't place — count as miss
      state.flying = null;
      return;
    }
    state.grid[best.r][best.c] = f.color;
    state.flying = null;
    sfx.stick();
    state.shotsTaken++;

    // Check matches
    const cluster = findCluster(best.c, best.r, f.color);
    if (cluster.length >= 3) {
      popCluster(cluster);
      // Then drop disconnected
      const dropped = findDisconnected();
      dropCluster(dropped);
      // Award
      state.score += cluster.length * 10;
      state.score += dropped.length * 30;
      sfx.pop(cluster.length);
      if (dropped.length > 0) setTimeout(() => sfx.fall(), 120);
      state.shake = Math.min(8, cluster.length + dropped.length * 0.5);
    }

    // Check level complete
    if (isBoardClear()) {
      state.mode = 'levelDone';
      state.modeTimer = 90;
      state.score += 1000;
      sfx.level();
      return;
    }

    // Check dead line
    if (anyBubblePastDeadLine()) {
      gameOver();
      return;
    }

    // Periodic ceiling drop
    if (state.shotsTaken > 0 && state.shotsTaken % SHOTS_PER_DROP === 0) {
      state.ceilingOffset += CELL_H;
      sfx.drop();
      state.shake = Math.max(state.shake, 4);
      if (anyBubblePastDeadLine()) { gameOver(); return; }
    }
  }

  function findCluster(c, r, color) {
    const seen = new Set();
    const stack = [[c, r]];
    const out = [];
    while (stack.length) {
      const [cc, rr] = stack.pop();
      const k = cc + ',' + rr;
      if (seen.has(k)) continue;
      seen.add(k);
      if (!cellInBounds(cc, rr)) continue;
      if (state.grid[rr][cc] !== color) continue;
      out.push([cc, rr]);
      for (const [nc, nr] of neighbors(cc, rr)) stack.push([nc, nr]);
    }
    return out;
  }

  function findDisconnected() {
    // BFS from all bubbles in row 0; whatever is left disconnected falls
    const seen = new Set();
    const stack = [];
    for (let c = 0; c < COLS; c++) {
      if (cellInBounds(c, 0) && state.grid[0][c] >= 0) stack.push([c, 0]);
    }
    while (stack.length) {
      const [cc, rr] = stack.pop();
      const k = cc + ',' + rr;
      if (seen.has(k)) continue;
      if (!cellInBounds(cc, rr)) continue;
      if (state.grid[rr][cc] < 0) continue;
      seen.add(k);
      for (const [nc, nr] of neighbors(cc, rr)) stack.push([nc, nr]);
    }
    const out = [];
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (!cellInBounds(c, r)) continue;
        if (state.grid[r][c] < 0) continue;
        if (!seen.has(c + ',' + r)) out.push([c, r]);
      }
    }
    return out;
  }

  function popCluster(cells) {
    for (const [c, r] of cells) {
      const ctr = cellCenter(c, r);
      const color = state.grid[r][c];
      state.popping.push({ x: ctr.x, y: ctr.y, color, t: 0, max: 18 });
      spawnPopParticles(ctr.x, ctr.y, COLORS[color], 6);
      state.grid[r][c] = -1;
    }
  }

  function dropCluster(cells) {
    for (const [c, r] of cells) {
      const ctr = cellCenter(c, r);
      const color = state.grid[r][c];
      state.falling.push({
        x: ctr.x, y: ctr.y, color,
        vx: (Math.random() - 0.5) * 1.2,
        vy: -0.5 - Math.random() * 1,
        life: 90,
      });
      state.grid[r][c] = -1;
    }
  }

  function isBoardClear() {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (!cellInBounds(c, r)) continue;
        if (state.grid[r][c] >= 0) return false;
      }
    }
    return true;
  }

  function anyBubblePastDeadLine() {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (!cellInBounds(c, r)) continue;
        if (state.grid[r][c] < 0) continue;
        const ctr = cellCenter(c, r);
        if (ctr.y > DEAD_LINE_Y) return true;
      }
    }
    return false;
  }

  function gameOver() {
    state.mode = 'gameOver';
    state.modeTimer = 90;
    if (state.score > state.best) {
      state.best = state.score;
      localStorage.setItem('simpleBustAMove.best', String(state.best));
    }
    state.shake = 12;
    sfx.over();
    showOverlay('Game Over', 'The bubbles won this round.<br>Try again!', true);
  }

  // ===== Particles =====
  function spawnPopParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 1 + Math.random() * 2;
      state.particles.push({
        x, y,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s - 0.5,
        life: 24 + Math.random() * 10,
        max: 34,
        color,
      });
    }
  }
  function updateParticles() {
    for (const p of state.particles) {
      p.life--;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.16;
    }
    state.particles = state.particles.filter((p) => p.life > 0);
  }
  function updatePopping() {
    for (const p of state.popping) p.t++;
    state.popping = state.popping.filter((p) => p.t < p.max);
  }
  function updateFalling() {
    for (const f of state.falling) {
      f.life--;
      f.vy += 0.25;
      f.x += f.vx;
      f.y += f.vy;
    }
    state.falling = state.falling.filter((f) => f.life > 0 && f.y < WORLD_H + 30);
  }

  // ===== Aim trajectory preview =====
  function computeAimPath(ang, maxBounces = 4, maxSteps = 220) {
    const path = [];
    let x = state.shooter.x;
    let y = state.shooter.y - BR - 2;
    let vx = Math.sin(ang) * SHOT_SPEED;
    let vy = -Math.cos(ang) * SHOT_SPEED;
    path.push({ x, y });
    let bounces = 0;
    for (let i = 0; i < maxSteps; i++) {
      x += vx; y += vy;
      if (x - BR < 0) { x = BR; vx = Math.abs(vx); bounces++; path.push({ x, y, bounce: true }); }
      if (x + BR > WORLD_W) { x = WORLD_W - BR; vx = -Math.abs(vx); bounces++; path.push({ x, y, bounce: true }); }
      if (bounces > maxBounces) break;
      if (y - BR < state.ceilingOffset + 2) { path.push({ x, y }); break; }
      // Stop at first grid bubble
      let hit = false;
      for (let r = 0; r < ROWS && !hit; r++) {
        for (let c = 0; c < COLS; c++) {
          if (!cellInBounds(c, r)) continue;
          if (state.grid[r][c] < 0) continue;
          const ctr = cellCenter(c, r);
          const dx = ctr.x - x, dy = ctr.y - y;
          if (dx * dx + dy * dy < (BR * 2) * (BR * 2)) { hit = true; break; }
        }
      }
      if (hit) { path.push({ x, y }); break; }
    }
    return path;
  }

  // ===== Drawing =====
  function drawBubble(x, y, color, opts = {}) {
    const r = opts.radius || BR - 1;
    const shadow = opts.shadow || SHADOWS[color] || '#222';
    const main = COLORS[color] || '#888';
    // outer shadow ring
    ctx.fillStyle = shadow;
    ctx.beginPath(); ctx.arc(x, y + 1, r + 1, 0, Math.PI * 2); ctx.fill();
    // main fill
    ctx.fillStyle = main;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
    // inner darker arc bottom-right
    ctx.fillStyle = shadow;
    ctx.globalAlpha = 0.35;
    ctx.beginPath();
    ctx.arc(x, y, r, Math.PI * 0.1, Math.PI * 0.9);
    ctx.lineTo(x, y);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
    // shine
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath(); ctx.arc(x - r * 0.35, y - r * 0.4, r * 0.22, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath(); ctx.arc(x - r * 0.5, y - r * 0.2, r * 0.1, 0, Math.PI * 2); ctx.fill();
  }

  function drawGrid() {
    if (!state.grid) return;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (!cellInBounds(c, r)) continue;
        const v = state.grid[r][c];
        if (v < 0) continue;
        const ctr = cellCenter(c, r);
        if (ctr.y < -BR || ctr.y > PLAY_H + BR) continue;
        drawBubble(ctr.x, ctr.y, v);
      }
    }
  }

  function drawPlayfieldBg() {
    // Top ceiling cap
    ctx.fillStyle = '#1a1f2c';
    ctx.fillRect(0, 0, WORLD_W, 2 + state.ceilingOffset);
    ctx.fillStyle = '#2a3142';
    ctx.fillRect(0, state.ceilingOffset, WORLD_W, 2);
    // Dead line
    ctx.strokeStyle = 'rgba(255,85,119,0.35)';
    ctx.setLineDash([3, 3]);
    ctx.beginPath();
    ctx.moveTo(0, DEAD_LINE_Y);
    ctx.lineTo(WORLD_W, DEAD_LINE_Y);
    ctx.stroke();
    ctx.setLineDash([]);
    // Sub-shooter divider
    ctx.fillStyle = '#1a1f2c';
    ctx.fillRect(0, PLAY_H, WORLD_W, 2);
    // Shooter panel bg
    ctx.fillStyle = '#10131b';
    ctx.fillRect(0, PLAY_H + 2, WORLD_W, SHOOTER_PANEL_H - 2);
  }

  function drawShooter() {
    const s = state.shooter;
    // Base
    ctx.fillStyle = '#1d2230';
    ctx.beginPath(); ctx.arc(s.x, s.y, 14, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#2a3142';
    ctx.beginPath(); ctx.arc(s.x, s.y, 13, 0, Math.PI * 2); ctx.fill();
    // Barrel
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.angle);
    ctx.fillStyle = '#2a3142';
    ctx.fillRect(-3, -22, 6, 22);
    ctx.fillStyle = '#3a4358';
    ctx.fillRect(-2, -22, 4, 22);
    ctx.restore();
    // Loaded bubble
    drawBubble(s.x, s.y, state.current);
    // Next bubble preview (small, off-side)
    const nx = s.x - 36, ny = s.y;
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.beginPath(); ctx.arc(nx, ny, 10, 0, Math.PI * 2); ctx.fill();
    drawBubble(nx, ny, state.next, { radius: 8 });
    ctx.fillStyle = 'var(--text-dim)';
    ctx.fillStyle = '#8a93a8';
    ctx.font = '8px -apple-system, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('NEXT', nx, ny + 20);
    // Shots-until-drop indicator
    const sx2 = s.x + 36, sy2 = s.y;
    ctx.fillStyle = '#8a93a8';
    ctx.font = '8px -apple-system, system-ui, sans-serif';
    ctx.fillText('DROP', sx2, sy2 + 20);
    const left = SHOTS_PER_DROP - (state.shotsTaken % SHOTS_PER_DROP);
    ctx.fillStyle = '#e6e9f2';
    ctx.font = 'bold 14px -apple-system, system-ui, sans-serif';
    ctx.fillText(String(left), sx2, sy2 + 4);
    ctx.textAlign = 'left';
  }

  function drawAimLine() {
    if (state.flying) return;
    if (state.mode !== 'playing') return;
    if (!state.showAim && !state.aimDragging) {
      // Subtle hint line
      const ang = state.shooter.angle;
      const len = 30;
      ctx.strokeStyle = 'rgba(230,233,242,0.25)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(state.shooter.x, state.shooter.y - BR - 2);
      ctx.lineTo(state.shooter.x + Math.sin(ang) * len, state.shooter.y - BR - 2 - Math.cos(ang) * len);
      ctx.stroke();
      return;
    }
    const path = computeAimPath(state.shooter.angle);
    ctx.strokeStyle = 'rgba(92,201,255,0.9)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    for (let i = 0; i < path.length; i++) {
      const p = path[i];
      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
    ctx.setLineDash([]);
    // Endpoint marker
    if (path.length > 0) {
      const e = path[path.length - 1];
      ctx.fillStyle = 'rgba(92,201,255,0.5)';
      ctx.beginPath(); ctx.arc(e.x, e.y, 4, 0, Math.PI * 2); ctx.fill();
    }
  }

  function drawFlying() {
    if (!state.flying) return;
    drawBubble(state.flying.x, state.flying.y, state.flying.color);
  }

  function drawPopping() {
    for (const p of state.popping) {
      const k = p.t / p.max;
      const r = (BR - 1) * (1 + k * 0.7);
      ctx.globalAlpha = 1 - k;
      ctx.strokeStyle = COLORS[p.color];
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2); ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }
  function drawFalling() {
    for (const f of state.falling) drawBubble(f.x, f.y, f.color);
  }
  function drawParticles() {
    for (const p of state.particles) {
      const a = Math.max(0, p.life / p.max);
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      ctx.fillRect(Math.round(p.x), Math.round(p.y), 2, 2);
    }
    ctx.globalAlpha = 1;
  }

  function drawOverlayText() {
    if (state.mode === 'levelDone') {
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(0, 0, WORLD_W, WORLD_H);
      ctx.fillStyle = '#5cd86b';
      ctx.font = 'bold 18px -apple-system, system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('LEVEL CLEAR', WORLD_W / 2, PLAY_H / 2);
      ctx.fillStyle = '#e6e9f2';
      ctx.font = '12px -apple-system, system-ui, sans-serif';
      ctx.fillText('+1000', WORLD_W / 2, PLAY_H / 2 + 18);
      ctx.textAlign = 'left';
    }
  }

  function render() {
    ctx.save();
    if (state.shake > 0) {
      ctx.translate((Math.random() - 0.5) * state.shake, (Math.random() - 0.5) * state.shake);
      state.shake = Math.max(0, state.shake - 0.6);
    }
    ctx.clearRect(0, 0, WORLD_W, WORLD_H);
    drawPlayfieldBg();
    // Background stars
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    for (let i = 0; i < 20; i++) {
      const x = (i * 47 + state.frame * 0.05) % WORLD_W;
      const y = (i * 91) % PLAY_H;
      ctx.fillRect(x | 0, y | 0, 1, 1);
    }
    drawGrid();
    drawPopping();
    drawFalling();
    drawAimLine();
    drawShooter();
    drawFlying();
    drawParticles();
    drawOverlayText();
    ctx.restore();
  }

  // ===== Game loop =====
  function update() {
    state.frame++;

    if (state.mode === 'playing') {
      // Aim via buttons / keys
      if (keys.left)  state.shooter.angle = Math.max(MIN_ANGLE, state.shooter.angle - 0.035);
      if (keys.right) state.shooter.angle = Math.min(MAX_ANGLE, state.shooter.angle + 0.035);
      if (keys.left || keys.right) state.showAim = true;

      if (edge.fire) { fireBubble(); edge.fire = false; }
      if (edge.swap) { swapBubble(); edge.swap = false; }

      if (state.flying) updateFlying();
      updatePopping();
      updateFalling();
      updateParticles();
    } else if (state.mode === 'levelDone') {
      updateParticles();
      updatePopping();
      updateFalling();
      state.modeTimer--;
      if (state.modeTimer <= 0) {
        state.level++;
        if (state.level >= LEVELS.length) {
          state.mode = 'won';
          if (state.score > state.best) {
            state.best = state.score;
            localStorage.setItem('simpleBustAMove.best', String(state.best));
          }
          showOverlay('You Won! 💚', 'Every bubble — popped. Incredible.', true);
        } else {
          loadLevel(state.level);
          state.mode = 'playing';
        }
      }
    } else if (state.mode === 'gameOver' || state.mode === 'won') {
      updateParticles();
      updatePopping();
      updateFalling();
    } else if (state.mode === 'menu') {
      updateParticles();
    }

    // Clear leftover edges if not playing
    if (state.mode !== 'playing') { edge.fire = false; edge.swap = false; }

    // HUD
    document.getElementById('score').textContent = state.score;
    document.getElementById('level').textContent = (state.level + 1) + ' / ' + LEVELS.length;
    document.getElementById('best').textContent = state.best;
  }

  function loop() {
    update();
    render();
    requestAnimationFrame(loop);
  }

  // ===== Menu / Overlay =====
  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  function showOverlay(title, msg, withStats) {
    document.getElementById('panelTitle').textContent = title;
    document.getElementById('panelMsg').innerHTML = msg;
    document.getElementById('panelStats').style.display = withStats ? 'flex' : 'none';
    document.getElementById('panelScore').textContent = state.score;
    document.getElementById('panelLevel').textContent = state.level + 1;
    document.getElementById('panelBest').textContent = state.best;
    startBtn.textContent = state.mode === 'menu' ? 'Start' : 'Play Again';
    overlay.classList.add('show');
  }
  function hideOverlay() { overlay.classList.remove('show'); }

  function startGame() {
    if (audio()) audio().resume();
    state.score = 0;
    state.level = 0;
    state.mode = 'playing';
    loadLevel(0);
    hideOverlay();
    sfx.start();
  }
  startBtn.addEventListener('click', startGame);
  startBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startGame(); }, { passive: false });

  // Initial state — show level 0 behind menu
  state.level = 0;
  loadLevel(0);
  state.mode = 'menu';
  resize();
  setTimeout(resize, 30);
  setTimeout(resize, 200);
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
